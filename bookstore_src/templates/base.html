<!DOCTYPE html>
<html>
  <head>
    <title>Kecheng's Bookstore</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  </head>
  <body>
    <header>
      <div id="leftHeader">
        <a href="{{ url_for('home') }}">
          <h1>Kecheng's Bookstore</h1>
        </a>
        <p class="tagline">Find your next favorite book</p>
      </div>

      <div id="midHeader">
        <form id="searchBoxForm" action="{{ url_for('search') }}" method="post">
          <input id="searchBox" type="text" placeholder="Search by book title" name="search">
          <button id="searchButton" type="submit">Search</button>
        </form>

        <nav class="dropdown">
          <p class="dropdownSelect">Browse Categories</p>
          <div class="dropdownContent">
            {% for category in categories %}
              <p>
                <a href="{{ url_for('category', categoryId=category.categoryId) }}">
                  {{ category.categoryName }}
                </a>
              </p>
            {% endfor %}
          </div>
        </nav>
      </div>

      <div id="rightHeader">
        <div class="navButton">
          <a href="{{ url_for('add_book') }}">Add Book</a>
        </div>
      </div>
    </header>

    <main>
      {% block container %}{% endblock %}
    </main>

    <footer>
      <div id="footerLeft">
        <p>Kecheng's Bookstore</p>
        <p>Student Flask + SQLite Project</p>
      </div>
      <div id="footerRight">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('add_book') }}">Add Book</a>
      </div>
    </footer>
  </body>
</html>
